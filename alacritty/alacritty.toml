[terminal.shell]
program               = "/usr/bin/zsh"
args                  = [ "--login", ]

[window]
padding               = { x = 2, y = 2 }
decorations           = "None"
opacity               = 1.0
blur                  = true

[scrolling]
history               = 65535

[font]
normal                = { family = "InconsolataNerdFont", style = "Regular" }
bold                  = { family = "InconsolataNerdFont", style = "Bold" }
italic                = { family = "InconsolataNerdFont", style = "Italic" }
bold_italic           = { family = "InconsolataNerdFont", style = "Bold Italic" }
offset                = { x = 0, y = 0 }
glyph_offset          = { x = 0, y = 0 }

[colors.primary]
foreground = "#c6c0b9"
background = "#25222a"

[colors.cursor]
text = "#25222a"
cursor = "#c6c0b9"

[colors.selection]
text = "#25222a"
background = "#4d4d4d"

[colors.normal]
black = "#2c2c30"
red = "#a97070"
green = "#778c73"
yellow = "#cc9166"
blue = "#6c7f93"
magenta = "#b894af"
cyan = "#8ea4a2"
white = "#afa79d"

[colors.bright]
black = "#a5a59c"
red = "#bc8f8f"
green = "#92a38f"
yellow = "#d9ac8c"
blue = "#8a99a8"
magenta = "#ccb3c6"
cyan = "#aabbba"
white = "#c6c0b9"
